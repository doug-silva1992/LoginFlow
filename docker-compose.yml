services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loginflow_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - loginflow
    healthcheck:
      test: ["CMD-SHELL", "php -r \"$s=@fsockopen('127.0.0.1',9000,$e,$m,1);if(!$s){exit(1);}fclose($s);exit(0);\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: loginflow_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy
    networks:
      - loginflow

  db:
    image: mysql:8.0
    container_name: loginflow_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-loginflow}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - loginflow

networks:
  loginflow:
    driver: bridge

volumes:
  db_data:
